        const MapPin = ({ size = 24, ...props }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                <circle cx="12" cy="10" r="3"></circle>

        );
        
        const Thermometer = ({ size = 24, ...props }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
                <path d="M14 4v10.54a4 4 0 1 1-4 0V4a2 2 0 0 1 4 0Z"></path>
            </svg>
        );
        
        const Edit2 = ({ size = 24, ...props }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
                <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path>
            </svg>
        );

        const GardenTrackerApp = () => {
            const [plants, setPlants] = useState(() => {
                const saved = localStorage.getItem('gardenPlants');
                return saved ? JSON.parse(saved) : [];
            });
            const [showAddPlant, setShowAddPlant] = useState(false);
            const [editingPlant, setEditingPlant] = useState(null);
            const [currentView, setCurrentView] = useState('list');
            const [currentMonth, setCurrentMonth] = useState(new Date().getMonth());
            const [currentYear, setCurrentYear] = useState(new Date().getFullYear());
            const [searchQuery, setSearchQuery] = useState('');
            const [showPoisonInfo, setShowPoisonInfo] = useState(null);
            const [poisonControlNumber, setPoisonControlNumber] = useState(() => {
                const saved = localStorage.getItem('poisonControlNumber');
                return saved || '';
            });
            const [usdaHardinessZone, setUsdaHardinessZone] = useState(() => {
                const saved = localStorage.getItem('usdaHardinessZone');
                return saved || '';
            });
            
            const [newPlant, setNewPlant] = useState({
                commonName: '',
                taxonomicName: '',
                image: null,
                wateringFrequency: 4,
                lastWatered: {
                    month: new Date().getMonth() + 1,
                    day: new Date().getDate()
                },
                safeForPets: false,
                nativeCalifornia: false,
                infoUrl: '',
                fertilizeMonths: [],
                fertilizerType: '',
                pruneMonths: [],
                nutritionalValue: '',
                notes: '',
                safetyNotes: '',
                location: ''
            });

            useEffect(() => {
                localStorage.setItem('gardenPlants', JSON.stringify(plants));
            }, [plants]);

            useEffect(() => {
                localStorage.setItem('poisonControlNumber', poisonControlNumber);
            }, [poisonControlNumber]);
            
            useEffect(() => {
                localStorage.setItem('usdaHardinessZone', usdaHardinessZone);
            }, [usdaHardinessZone]);

            const months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
            
            const getDaysInMonth = (month, year) => {
                return new Date(year, month + 1, 0).getDate();
            };

            const handleImageCapture = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        setNewPlant({...newPlant, image: reader.result});
                    };
                    reader.readAsDataURL(file);
                }
            };

            const calculateNextWatering = (lastWatered, frequency) => {
                const daysInMonth = 30;
                const daysBetweenWatering = Math.floor(daysInMonth / frequency);
                
                const lastDate = new Date(currentYear, lastWatered.month - 1, lastWatered.day);
                const nextDate = new Date(lastDate);
                nextDate.setDate(nextDate.getDate() + daysBetweenWatering);
                
                return nextDate;
            };

            const addPlant = () => {
                if (newPlant.commonName || newPlant.taxonomicName) {
                    setPlants([...plants, { ...newPlant, id: Date.now() }]);
                    resetForm();
                    setShowAddPlant(false);
                }
            };
            
            const startEditPlant = (plant) => {
                setEditingPlant(plant.id);
                setNewPlant({...plant});
                setShowAddPlant(false);
            };
            
            const updatePlant = () => {
                if (newPlant.commonName || newPlant.taxonomicName) {
                    setPlants(plants.map(p => p.id === editingPlant ? {...newPlant, id: editingPlant} : p));
                    resetForm();
                    setEditingPlant(null);
                }
            };
            
            const cancelEdit = () => {
                setEditingPlant(null);
                resetForm();
            };

            const resetForm = () => {
                setNewPlant({
                    commonName: '',
                    taxonomicName: '',
                    image: null,
                    wateringFrequency: 4,
                    lastWatered: {
                        month: new Date().getMonth() + 1,
                        day: new Date().getDate()
                    },
                    safeForPets: false,
                    nativeCalifornia: false,
                    infoUrl: '',
                    fertilizeMonths: [],
                    fertilizerType: '',
                    pruneMonths: [],
                    nutritionalValue: '',
                    notes: '',
                    safetyNotes: '',
                    location: ''
                });
            };

            const deletePlant = (id) => {
                if (confirm('Are you sure you want to delete this plant?')) {
                    setPlants(plants.filter(p => p.id !== id));
                }
            };

            const toggleMonth = (monthIndex, field) => {
                const currentMonths = newPlant[field];
                if (currentMonths.includes(monthIndex)) {
                    setNewPlant({
                        ...newPlant,
                        [field]: currentMonths.filter(m => m !== monthIndex)
                    });
                } else {
                    setNewPlant({
                        ...newPlant,
                        [field]: [...currentMonths, monthIndex].sort((a, b) => a - b)
                    });
                }
            };
            
            const filteredPlants = plants.filter(plant => {
                if (!searchQuery.trim()) return true;
                const query = searchQuery.toLowerCase();
                return (
                    (plant.commonName && plant.commonName.toLowerCase().includes(query)) ||
                    (plant.taxonomicName && plant.taxonomicName.toLowerCase().includes(query)) ||
                    (plant.location && plant.location.toLowerCase().includes(query)) ||
                    (plant.notes && plant.notes.toLowerCase().includes(query))
                );
            });

            const getCalendarTasks = () => {
                const tasks = [];
                
                plants.forEach(plant => {
                    const nextWater = calculateNextWatering(plant.lastWatered, plant.wateringFrequency);
                    if (nextWater.getMonth() === currentMonth && nextWater.getFullYear() === currentYear) {
                        tasks.push({
                            type: 'water',
                            plant: plant.commonName || plant.taxonomicName,
                            date: nextWater.getDate()
                        });
                    }
                    
                    if (plant.fertilizeMonths.includes(currentMonth)) {
                        tasks.push({
                            type: 'fertilize',
                            plant: plant.commonName || plant.taxonomicName,
                            fertilizer: plant.fertilizerType,
                            month: true
                        });
                    }
                    
                    if (plant.pruneMonths.includes(currentMonth)) {
                        tasks.push({
                            type: 'prune',
                            plant: plant.commonName || plant.taxonomicName,
                            month: true
                        });
                    }
                });
                
                return tasks;
            };

            const renderCalendar = () => {
                const daysInMonth = getDaysInMonth(currentMonth, currentYear);
                const firstDay = new Date(currentYear, currentMonth, 1).getDay();
                const tasks = getCalendarTasks();
                
                const days = [];
                for (let i = 0; i < firstDay; i++) {
                    days.push(<div key={`empty-${i}`} className="calendar-day empty"></div>);
                }
                
                for (let day = 1; day <= daysInMonth; day++) {
                    const dayTasks = tasks.filter(t => t.date === day);
                    days.push(
                        <div key={day} className="calendar-day">
                            <div className="day-number">{day}</div>
                            <div className="day-tasks">
                                {dayTasks.map((task, idx) => (
                                    <div key={idx} className={`task-dot ${task.type}`} title={`${task.type} ${task.plant}`}>
                                        {task.type === 'water' && <Droplet size={12} />}
                                        {task.type === 'fertilize' && <Leaf size={12} />}
                                        {task.type === 'prune' && <Scissors size={12} />}
                                    </div>
                                ))}
                            </div>
                        </div>
                    );
                }
                
                return days;
            };

            const monthTasks = getCalendarTasks().filter(t => t.month);

            return (
                <div className="app-container">
                    <style>{`
                        * {
                            margin: 0;

                            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;

                            min-height: 100vh;
                        }

                        .app-container {

                        }

                        .header h1 {
                            color: #667eea;
                            font-size: 1.75rem;
                            margin-bottom: 1rem;
                            display: flex;
                            align-items: center;
                            gap: 0.5rem;
                        }

                        .nav-tabs {
                            display: flex;
                            gap: 0.5rem;
                            flex-wrap: wrap;
                        }

                        .tab-button {
                            padding: 0.75rem 1.5rem;
                            border: none;
                            background: #f3f4f6;
                            border-radius: 0.5rem;
                            cursor: pointer;
                            font-size: 0.95rem;
                            font-weight: 500;
                            transition: all 0.2s;
                            display: flex;
                            align-items: center;
                            gap: 0.5rem;
                        }

                        .tab-button:hover {
                            background: #e5e7eb;
                        }

                        .tab-button.active {
                            background: #667eea;
                            color: white;
                        }

                        .content-section {
                            background: white;
                            border-radius: 1rem;
                            padding: 1.5rem;
                            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
                        }

                        .add-plant-button {
                            width: 100%;
                            padding: 1rem;
                            background: #10b981;
                            color: white;
                            border: none;
                            border-radius: 0.5rem;
                            font-size: 1rem;
                            font-weight: 600;
                            cursor: pointer;
                            display: flex;
                            align-items: center;
                            justify-content: center;

                            background: #059669;

                        .plant-name {
                            font-size: 1.1rem;

                                                        {month.substring(0, 3)}
                                                    </div>
                                                ))}
                                            </div>
                                        </div>

                                        <div className="form-actions">
                                            {editingPlant ? (
                                                <>
                                                    <button className="btn btn-primary" onClick={updatePlant}>
                                                        <Check size={18} />
                                                        Update Plant
                                                    </button>
                                                    <button className="btn btn-secondary" onClick={cancelEdit}>
                                                        <X size={18} />
                                                        Cancel
                                                    </button>
                                                </>
                                            ) : (
                                                <>
                                                    <button className="btn btn-primary" onClick={addPlant}>
                                                        <Check size={18} />
                                                        Add Plant
                                                    </button>
                                                    <button className="btn btn-secondary" onClick={() => {
                                                        setShowAddPlant(false);
                                                        resetForm();
                                                    }}>
                                                        <X size={18} />
                                                        Cancel
                                                    </button>
                                                </>
                                            )}
                                        </div>
                                    </div>
                                )}

                                {plants.length === 0 && !showAddPlant && !editingPlant ? (
                                    <div className="empty-state">
                                        <Leaf size={64} />
                                        <h3>No plants yet</h3>
                                        <p>Add your first plant to start tracking its care</p>
                                    </div>
                                ) : filteredPlants.length === 0 && !showAddPlant && !editingPlant ? (
                                    <div className="empty-state">
                                        <Search size={64} />
                                        <h3>No plants found</h3>
                                        <p>Try a different search term</p>
                                    </div>
                                ) : (
                                    <div className="plants-grid">
                                        {filteredPlants.map(plant => {
                                            const nextWater = calculateNextWatering(plant.lastWatered, plant.wateringFrequency);
                                            return (
                                                <div key={plant.id} className="plant-card">
                                                    <div className="plant-header">
                                                        {plant.image ? (
                                                            <img src={plant.image} alt={plant.commonName} className="plant-image" />
                                                        ) : (
                                                            <div className="plant-image">
                                                                <Leaf size={32} />
                                                            </div>
                                                        )}
                                                        <div className="plant-info">
                                                            <div className="plant-name">{plant.commonName || 'Unnamed Plant'}</div>
                                                            {plant.taxonomicName && (
                                                                <div className="plant-scientific">{plant.taxonomicName}</div>
                                                            )}
                                                            <div className="plant-badges">
                                                                {plant.safeForPets && (
                                                                    <span className="badge badge-safe">
                                                                        <Check size={12} />
                                                                        Safe for pets
                                                                    </span>
                                                                )}
                                                                {plant.nativeCalifornia && (
                                                                    <span className="badge badge-native">
                                                                        Native CA
                                                                    </span>
                                                                )}
                                                            </div>
                                                        </div>
                                                    </div>
                                                    
                                                    <div className="plant-details">
                                                        {plant.location && (
                                                            <div className="detail-row">
                                                                <MapPin size={16} />
                                                                <span>{plant.location}</span>
                                                            </div>
                                                        )}
                                                        <div className="detail-row">
                                                            <Droplet size={16} />
                                                            <span>Water {plant.wateringFrequency}x/month • Next: {nextWater.toLocaleDateString()}</span>
                                                        </div>
                                                        {plant.fertilizeMonths && plant.fertilizeMonths.length > 0 && (
                                                            <div className="detail-row">
                                                                <Leaf size={16} />
                                                                <span>Fertilize: {plant.fertilizeMonths.map(m => months[m].substring(0, 3)).join(', ')}</span>
                                                            </div>
                                                        )}
                                                        {plant.pruneMonths && plant.pruneMonths.length > 0 && (
                                                            <div className="detail-row">
                                                                <Scissors size={16} />
                                                                <span>Prune: {plant.pruneMonths.map(m => months[m].substring(0, 3)).join(', ')}</span>
                                                            </div>
                                                        )}
                                                        {plant.safetyNotes && (
                                                            <div className="detail-row" style={{alignItems: 'flex-start'}}>
                                                                <AlertCircle size={16} style={{marginTop: '2px', color: '#f59e0b'}} />
                                                                <div>
                                                                    <strong style={{color: '#92400e'}}>Safety:</strong>{' '}
                                                                    <span style={{color: '#78350f'}}>{plant.safetyNotes}</span>
                                                                    {poisonControlNumber && (
                                                                        <button 
                                                                            className="info-icon-button"
                                                                            onClick={() => setShowPoisonInfo(plant.id)}
                                                                            style={{marginLeft: '0.25rem'}}
                                                                        >
                                                                            <Info size={14} />
                                                                        </button>
                                                                    )}
                                                                </div>
                                                            </div>
                                                        )}
                                                        {plant.notes && (
                                                            <div className="detail-row" style={{alignItems: 'flex-start'}}>
                                                                <Info size={16} style={{marginTop: '2px'}} />
                                                                <span>{plant.notes}</span>
                                                            </div>
                                                        )}
                                                        {plant.infoUrl && (
                                                            <div className="detail-row">
                                                                <ExternalLink size={16} />
                                                                <a href={plant.infoUrl} target="_blank" rel="noopener noreferrer" style={{color: '#667eea', textDecoration: 'none'}}>
                                                                    More info
                                                                </a>
                                                            </div>
                                                        )}
                                                    </div>

                                                    <div className="plant-actions">
                                                        <button className="icon-button" onClick={() => startEditPlant(plant)} title="Edit plant">
                                                            <Edit2 size={18} />
                                                        </button>
                                                        <button className="icon-button delete" onClick={() => deletePlant(plant.id)} title="Delete plant">
                                                            <Trash2 size={18} />
                                                        </button>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                )}
                            </>
                        )}

                        {currentView === 'calendar' && (
                            <div className="calendar-container">
                                <div className="calendar-header">
                                    <h2>{months[currentMonth]} {currentYear}</h2>
                                    <div className="calendar-nav">
                                        <button
                                            className="nav-button"
                                            onClick={() => {
                                                if (currentMonth === 0) {
                                                    setCurrentMonth(11);
                                                    setCurrentYear(currentYear - 1);
                                                } else {
                                                    setCurrentMonth(currentMonth - 1);
                                                }
                                            }}
                                        >
                                            <ChevronLeft size={20} />
                                        </button>
                                        <button
                                            className="nav-button"
                                            onClick={() => {
                                                if (currentMonth === 11) {
                                                    setCurrentMonth(0);
                                                    setCurrentYear(currentYear + 1);
                                                } else {
                                                    setCurrentMonth(currentMonth + 1);
                                                }
                                            }}
                                        >
                                            <ChevronRight size={20} />
                                        </button>
                                    </div>
                                </div>

                                <div className="calendar-grid">
                                    {['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'].map(day => (
                                        <div key={day} className="calendar-day-header">{day}</div>
                                    ))}
                                    {renderCalendar()}
                                </div>

                                {monthTasks.length > 0 && (
                                    <div className="month-tasks">
                                        <h3>Tasks for {months[currentMonth]}</h3>
                                        <div className="task-list">
                                            {monthTasks.map((task, idx) => (
                                                <div key={idx} className={`task-item ${task.type}`}>
                                                    <div className={`task-icon ${task.type}`}>
                                                        {task.type === 'fertilize' && <Leaf size={20} />}
                                                        {task.type === 'prune' && <Scissors size={20} />}
                                                    </div>
                                                    <div className="task-details">
                                                        <div className="task-plant">{task.plant}</div>
                                                        <div className="task-info">
                                                            {task.type === 'fertilize' && `Fertilize ${task.fertilizer ? `with ${task.fertilizer}` : ''}`}
                                                            {task.type === 'prune' && 'Prune this month'}
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {plants.length === 0 && (
                                    <div className="empty-state">
                                        <Calendar size={64} />
                                        <h3>No plants to schedule</h3>
                                        <p>Add some plants to see your care calendar</p>
                                    </div>
                                )}
                            </div>
                        )}
                    </div>
                    
                    {showPoisonInfo && (
                        <div className="modal-overlay" onClick={() => setShowPoisonInfo(null)}>
                            <div className="modal-content" onClick={(e) => e.stopPropagation()}>
                                <div className="modal-header">
                                    <h3>Emergency Information</h3>
                                    <button className="modal-close" onClick={() => setShowPoisonInfo(null)}>
                                        <X size={20} />
                                    </button>
                                </div>
                                
                                <div className="poison-control-section">
                                    <h4>Poison Control Center</h4>
                                    <div className="poison-control-number">{poisonControlNumber}</div>
                                    <p style={{fontSize: '0.85rem', color: '#78350f', marginTop: '0.5rem'}}>
                                        Call immediately if you suspect poisoning. Have plant information ready.
                                    </p>
                                </div>
                                
                                {showPoisonInfo !== 'form' && (
                                    <>
                                        {(() => {
                                            const plant = plants.find(p => p.id === showPoisonInfo);
                                            if (!plant) return null;
                                            
                                            return (
                                                <>
                                                    <div className="plant-info-section">
                                                        <h4>Plant Information</h4>
                                                        <p><strong>Common Name:</strong> {plant.commonName || 'N/A'}</p>
                                                        <p><strong>Scientific Name:</strong> {plant.taxonomicName || 'N/A'}</p>
                                                        {plant.location && <p><strong>Location:</strong> {plant.location}</p>}
                                                    </div>
                                                    
                                                    {plant.safetyNotes && (
                                                        <div className="plant-info-section">
                                                            <h4>Safety Information</h4>
                                                            <p>{plant.safetyNotes}</p>
                                                        </div>
                                                    )}
                                                    
                                                    {plant.nutritionalValue && (
                                                        <div className="plant-info-section">
                                                            <h4>Nutritional Value</h4>
                                                            <p style={{whiteSpace: 'pre-wrap'}}>{plant.nutritionalValue}</p>
                                                        </div>
                                                    )}
                                                </>
                                            );
                                        })()}
                                    </>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        ReactDOM.render(<GardenTrackerApp />, document.getElementById('root'));
    </script>
</body>
</html>
